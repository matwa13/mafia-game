version: "1.0"
namespace: app.npc

entries:
  - name: npc_test
    kind: process.lua
    source: file://npc_test.lua
    modules:
      - logger
      - events
      - time
      - sql
      - json
      - llm
      - prompt
      - hash
    method: run

  - name: npc_test_service
    kind: process.service
    process: app.npc:npc_test
    host: app.processes:host
    lifecycle:
      auto_start: true
      restart:
        max_attempts: 5
        initial_delay: 2s
        max_delay: 15s
        backoff_factor: 2.0
