version: "1.0"
namespace: app.npc

entries:
  - name: test_driver
    kind: process.lua
    source: file://test_driver.lua
    modules:
      - logger
      - time
      - sql
      - json
    method: run

  - name: test_driver_service
    kind: process.service
    process: app.npc:test_driver
    host: app.processes:host
    lifecycle:
      auto_start: true
      restart:
        max_attempts: 3
        initial_delay: 2s
        max_delay: 15s
        backoff_factor: 2.0
