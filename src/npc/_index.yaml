version: "1.0"
namespace: app.npc

entries:
  # Single-persona fixture + parameterised render_stable_block used as
  # byte-identity source for the D-15 SHA-256 tripwire.
  # Phase 3: imports persona_pool for derive_persona_args archetype lookup.
  - name: persona
    kind: library.lua
    source: file://persona.lua
    imports:
      persona_pool: app.npc:persona_pool
      persona_rules: app.npc:persona_rules

  # Isolated rules text — kept separate so its [[ ]] literal doesn't
  # cascade into persona.lua's syntax highlighting (WebStorm Wippy plugin).
  - name: persona_rules
    kind: library.lua
    source: file://persona_rules.lua

  # Single scope+role filter that is the ONLY approved event-to-prompt
  # renderer (D-11). Panics on cross-scope leak for the live NPC.
  - name: visible_context
    kind: library.lua
    source: file://visible_context.lua
    imports:
      pe: app.lib:events

  - name: persona_pool
    kind: library.lua
    source: file://persona_pool.lua

  - name: sampler
    kind: library.lua
    source: file://sampler.lua
