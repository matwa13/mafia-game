version: "1.0"
namespace: app

entries:
  # Local .env file — writable. The encryption-key bootloader (order 10)
  # persists a generated ENCRYPTION_KEY here if one isn't present; with
  # ENCRYPTION_KEY already set in .env, the bootloader reads it and skips.
  - name: env
    kind: env.storage.file
    file_path: ./.env
    auto_create: true
    file_mode: 0600
