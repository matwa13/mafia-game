version: "1.0"
namespace: app.game

entries:
  # D-22: MAFIA_DEV_MODE env declaration. env.get() only sees keys that are
  # registered as env.variable entries against a storage (env.storage.file
  # .env values are NOT surfaced to env.get() without this declaration).
  # Both test_driver.lua and orchestrator.lua read this key.
  - name: mafia_dev_mode
    kind: env.variable
    storage: app:env
    variable: MAFIA_DEV_MODE

  - name: test_driver
    kind: process.lua
    source: file://test_driver.lua
    modules:
      - logger
      - events
      - time
      - sql
      - env
    method: run

  - name: test_driver_service
    kind: process.service
    process: app.game:test_driver
    host: app.processes:host
    lifecycle:
      auto_start: true
      restart:
        max_attempts: 3
        initial_delay: 2s
        max_delay: 15s
        backoff_factor: 2.0
