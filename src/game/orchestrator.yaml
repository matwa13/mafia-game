version: "1.0"
namespace: app.game

entries:
  - name: orchestrator
    kind: process.lua
    source: file://orchestrator.lua
    modules:
      - logger
      - events
      - time
      - sql
      - uuid
      - env
      - json
    imports:
      pe: app.lib:events
      det_rng: app.lib:det_rng
      sampler: app.npc:sampler
      persona_pool: app.npc:persona_pool
      persona: app.npc:persona
      chat: app.game:chat               # NEW (cut 6, D-02)
      game_state: app.game:game_state             # NEW (cut 6)
      dev_telemetry: app.game:dev_telemetry       # NEW (cut 6)
    method: run
