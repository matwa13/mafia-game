version: "1.0"
namespace: app.game

entries:
  - name: chat
    kind: library.lua
    source: file://chat.lua
    modules:
      - logger
      - time
      - sql
      - env
      - channel
    imports:
      pe: app.lib:events

  # Quick task 260427-wg1: configurable artificial delay between an NPC's LLM
  # result and the chat.line commit. Read by chat.lua's commit_npc_chat_with_delay.
  # Phase 02 P05 lesson: env.get only resolves declared env.variable entries.
  - name: mafia_fake_thinking_delay_ms
    kind: env.variable
    storage: app:env
    variable: MAFIA_FAKE_THINKING_DELAY_MS
